---
# 1Password sub-task
- name: Install 1Password (macOS)
  when: ansible_facts.os_family == "Darwin"
  block:
    - name: Install 1Password via Homebrew
      community.general.homebrew_cask:
        name: 1password
        state: present

    - name: Install 1Password CLI via Homebrew
      community.general.homebrew_cask:
        name: 1password-cli
        state: present

- name: Install 1Password (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Check if 1Password keyring exists
      ansible.builtin.stat:
        path: /usr/share/keyrings/1password-archive-keyring.gpg
      register: _1password_keyring

    - name: Install 1Password GPG key
      when: not _1password_keyring.stat.exists
      block:
        - name: Download 1Password GPG key
          ansible.builtin.get_url:
            url: https://downloads.1password.com/linux/keys/1password.asc
            dest: /tmp/1password-key.asc
            mode: "0644"
          become: true

        - name: Dearmor 1Password GPG key
          ansible.builtin.command: gpg --batch --yes --dearmor -o /usr/share/keyrings/1password-archive-keyring.gpg /tmp/1password-key.asc
          become: true

        - name: Clean up 1Password key temp file
          ansible.builtin.file:
            path: /tmp/1password-key.asc
            state: absent
          become: true

    - name: Add 1Password apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main"
        filename: 1password
        state: present
      become: true

    - name: Install 1Password and CLI
      ansible.builtin.apt:
        name:
          - 1password
          - 1password-cli
        state: present
        update_cache: true
      become: true

- name: Fix 1Password icon on Mint themes (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Find 1Password icon symlinks in Mint themes
      ansible.builtin.find:
        paths:
          - /usr/share/icons/Mint-Y/apps
          - /usr/share/icons/Mint-L/apps
        patterns: "1password.png"
        recurse: true
        file_type: link
      register: _1password_icon_links

    - name: Remove 1Password icon symlinks (fall through to hicolor)
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ _1password_icon_links.files }}"
      loop_control:
        label: "{{ item.path }}"
      become: true
      register: _1password_icons_removed

    - name: Refresh icon caches for Mint themes  # noqa: no-handler
      ansible.builtin.command: "gtk-update-icon-cache -f /usr/share/icons/{{ item }}"
      loop:
        - Mint-Y
        - Mint-L
      become: true
      changed_when: true
      when: _1password_icons_removed.changed

- name: Ensure SSH config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.ssh/config.d"
    state: directory
    mode: "0700"

- name: Check if SSH config exists
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.ssh/config"
  register: _ssh_config

- name: Set SSH config permissions
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.ssh/config"
    mode: "0600"
  when: _ssh_config.stat.exists
