---
# Spotify sub-task
- name: Install Spotify (macOS)
  when: ansible_facts.os_family == "Darwin"
  block:
    - name: Verify Spotify is installed
      ansible.builtin.command: brew list --cask spotify
      register: spotify_check
      changed_when: false
      failed_when: false

    - name: Note about Spotify
      when: spotify_check.rc != 0
      ansible.builtin.debug:
        msg: "Spotify not installed. Add 'spotify' to Brewfile and run brew bundle."

- name: Install Spotify (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    # Clean up old apt-based Spotify install if migrating to Flatpak.
    - name: Remove apt-installed Spotify if present
      ansible.builtin.apt:
        name: spotify-client
        state: absent
      become: true

    - name: Remove old Spotify apt source
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/spotify.list
        state: absent
      become: true

    - name: Remove old Spotify keyring
      ansible.builtin.file:
        path: /usr/share/keyrings/spotify-archive-keyring.gpg
        state: absent
      become: true

    - name: Find stale Spotify keys in trusted.gpg.d
      ansible.builtin.find:
        paths: /etc/apt/trusted.gpg.d
        patterns: "spotify-*.gpg"
      register: _spotify_stale_keys

    - name: Remove stale Spotify keys from trusted.gpg.d
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ _spotify_stale_keys.files }}"
      loop_control:
        label: "{{ item.path }}"
      become: true
      when: _spotify_stale_keys.files | length > 0

    # Flatpak + Flathub are pre-installed on Linux Mint; ensure they
    # exist on other Debian-based systems.
    - name: Ensure Flatpak is installed
      ansible.builtin.apt:
        name: flatpak
        state: present
      become: true

    - name: Ensure Flathub remote is configured
      ansible.builtin.command: flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      changed_when: false
      become: true

    - name: Check if Spotify Flatpak is installed
      ansible.builtin.command: flatpak info com.spotify.Client
      register: _spotify_flatpak
      changed_when: false
      failed_when: false

    - name: Install Spotify via Flatpak
      ansible.builtin.command: flatpak install -y flathub com.spotify.Client
      when: _spotify_flatpak.rc != 0
      become: true
