---
# Editor role: VS Code installation and extensions

- name: Install VS Code (macOS)
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew_cask:
    name: visual-studio-code
    state: present

# VS Code's .deb post-install creates its own apt repo and GPG key
# for future updates. No need to manage the repo ourselves.
- name: Install VS Code (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Check if VS Code is already installed
      ansible.builtin.command: dpkg-query -W code
      register: _vscode_installed
      changed_when: false
      failed_when: false

    - name: Install VS Code from latest .deb
      when: _vscode_installed.rc != 0
      block:
        - name: Create temp file for VS Code download
          ansible.builtin.tempfile:
            suffix: .deb
          register: _vscode_tmp

        - name: Download latest VS Code .deb
          ansible.builtin.get_url:
            url: https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64
            dest: "{{ _vscode_tmp.path }}"
            mode: "0644"

        - name: Install VS Code .deb
          ansible.builtin.apt:
            deb: "{{ _vscode_tmp.path }}"
            state: present
          become: true

        - name: Clean up VS Code temp file
          ansible.builtin.file:
            path: "{{ _vscode_tmp.path }}"
            state: absent

    # Recover vendor apt source if missing (e.g. after a previous Phase 0
    # cleanup deleted it). The postinst recreates vscode.sources + the
    # GPG key at /usr/share/keyrings/microsoft.gpg.
    - name: Check if VS Code has an apt source
      ansible.builtin.shell: test -f /etc/apt/sources.list.d/vscode.sources -o -f /etc/apt/sources.list.d/vscode.list
      register: _vscode_has_source
      changed_when: false
      failed_when: false
      when: _vscode_installed.rc == 0

    - name: Restore VS Code vendor apt repo
      ansible.builtin.command: /var/lib/dpkg/info/code.postinst configure
      when:
        - _vscode_installed.rc == 0
        - _vscode_has_source.rc | default(0) != 0
      become: true

- name: Install VS Code extensions
  ansible.builtin.command: "code --install-extension {{ item }}"
  loop: "{{ lookup('file', role_path + '/files/extensions.txt').splitlines() | select | list }}"
  register: ext_result
  changed_when: "'was successfully installed' in ext_result.stdout"
  failed_when: false
