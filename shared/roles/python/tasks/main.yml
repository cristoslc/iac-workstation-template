---
- name: Check if uv is installed
  ansible.builtin.command: uv --version
  register: uv_check
  changed_when: false
  failed_when: false

- name: Install uv from pinned installer
  when: uv_check.rc != 0
  block:
    - name: "uv — download and verify installer"
      ansible.builtin.include_tasks: "{{ workstation_dir }}/shared/tasks/download-and-verify.yml"
      vars:
        tool_name: uv
        download_url: "https://astral.sh/uv/{{ uv_version }}/install.sh"
        expected_sha256: "{{ uv_installer_sha256 }}"

    - name: Run uv installer
      ansible.builtin.command: "sh {{ _verified_download.path }}"
      args:
        creates: "{{ ansible_facts.env.HOME }}/.local/bin/uv"

    - name: Clean up uv installer
      ansible.builtin.file:
        path: "{{ _verified_download.path }}"
        state: absent

- name: Install default Python via uv
  ansible.builtin.command: "{{ ansible_facts.env.HOME }}/.local/bin/uv python install {{ python_version }}"
  register: python_install
  changed_when: "'Installed' in python_install.stdout"
