---
# Configure pass + GPG for Docker Desktop credential storage (Linux only).
# Generates a dedicated passwordless GPG key, initializes pass, and sets up
# gpg-agent to pre-seed the cache at login so Docker never prompts.

- name: Check for existing Docker credential GPG key
  ansible.builtin.command: gpg --list-keys "Docker Credential Store"
  register: _docker_gpg_check
  changed_when: false
  failed_when: false

- name: Generate passwordless GPG key for Docker credential store
  when: _docker_gpg_check.rc != 0
  block:
    - name: Create GPG key batch file
      ansible.builtin.tempfile:
        suffix: .gpg-batch
      register: _gpg_batch_tmp

    - name: Write GPG batch parameters
      ansible.builtin.copy:
        dest: "{{ _gpg_batch_tmp.path }}"
        mode: "0600"
        content: |
          Key-Type: eddsa
          Key-Curve: ed25519
          Key-Usage: sign
          Subkey-Type: ecdh
          Subkey-Curve: cv25519
          Subkey-Usage: encrypt
          Name-Real: Docker Credential Store
          Name-Email: noreply@localhost
          Expire-Date: 0
          %no-protection
          %commit

    - name: Generate GPG key
      ansible.builtin.command: gpg --batch --generate-key {{ _gpg_batch_tmp.path }}

    - name: Clean up GPG key batch file
      ansible.builtin.file:
        path: "{{ _gpg_batch_tmp.path }}"
        state: absent

- name: Get Docker credential GPG key ID
  ansible.builtin.shell:
    cmd: "gpg --list-keys --with-colons 'Docker Credential Store' | awk -F: '/^pub/{print $5}'"
  register: _docker_gpg_key_id
  changed_when: false

- name: Check if pass is initialized
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.password-store/.gpg-id"
  register: _pass_store

- name: Initialize pass with Docker credential GPG key
  ansible.builtin.command: pass init {{ _docker_gpg_key_id.stdout }}
  when: not _pass_store.stat.exists

- name: Ensure gpg-agent.conf supports credential cache
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.gnupg/gpg-agent.conf"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    create: true
    mode: "0600"
  loop:
    - { regexp: "^default-cache-ttl", line: "default-cache-ttl 34560000" }
    - { regexp: "^max-cache-ttl", line: "max-cache-ttl 34560000" }
    - { regexp: "^allow-preset-passphrase", line: "allow-preset-passphrase" }
  register: _gpg_agent_conf

- name: Reload gpg-agent after config change
  ansible.builtin.command: gpg-connect-agent reloadagent /bye
  when: _gpg_agent_conf.changed
  changed_when: true

- name: Get encryption subkey keygrip
  ansible.builtin.shell:
    cmd: "gpg --with-keygrip --with-colons -K 'Docker Credential Store' | awk -F: '/^ssb/{s=1} s && /^grp/{print $10; exit}'"
  register: _docker_gpg_keygrip
  changed_when: false

- name: Ensure systemd user directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/systemd/user"
    state: directory
    mode: "0755"

- name: Deploy gpg-preset-passphrase systemd user service
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.config/systemd/user/gpg-preset-passphrase.service"
    mode: "0644"
    content: |
      [Unit]
      Description=Pre-seed GPG agent cache for Docker credential store
      After=gpg-agent.socket

      [Service]
      Type=oneshot
      ExecStart=/bin/sh -c 'echo "PRESET_PASSPHRASE {{ _docker_gpg_keygrip.stdout }} -1 00" | gpg-connect-agent'
      RemainAfterExit=yes

      [Install]
      WantedBy=default.target
  register: _preset_service

- name: Enable and start gpg-preset-passphrase service
  ansible.builtin.systemd:
    name: gpg-preset-passphrase.service
    scope: user
    enabled: true
    state: started
    daemon_reload: "{{ _preset_service.changed }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.user_uid }}"
