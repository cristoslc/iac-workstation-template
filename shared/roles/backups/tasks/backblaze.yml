---
# Backblaze sub-task (macOS only — installed via Brewfile)
- name: Install Backblaze (macOS)
  when: ansible_facts.os_family == "Darwin"
  block:
    - name: Verify Backblaze is installed
      ansible.builtin.command: brew list --cask backblaze
      register: backblaze_check
      changed_when: false
      failed_when: false

    - name: Note about Backblaze
      when: backblaze_check.rc != 0
      ansible.builtin.debug:
        msg: "Backblaze not installed. Add 'backblaze' to Brewfile and run brew bundle."
