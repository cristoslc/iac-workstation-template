---
# Dato sub-task (macOS only — Setapp-managed)
- name: Install Dato (macOS)
  when: ansible_facts.os_family == "Darwin"
  block:
    - name: Check if Dato is installed
      ansible.builtin.stat:
        path: /Applications/Setapp/Dato.app
      register: dato_check

    - name: Remind to install Dato via Setapp
      when: not dato_check.stat.exists
      ansible.builtin.debug:
        msg: "Dato is not installed. Install it via Setapp."
