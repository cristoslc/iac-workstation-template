---
# Slack sub-task
- name: Install Slack (macOS)
  when: ansible_facts.os_family == "Darwin"
  block:
    - name: Verify Slack is installed
      ansible.builtin.command: brew list --cask slack
      register: slack_check
      changed_when: false
      failed_when: false

    - name: Note about Slack
      when: slack_check.rc != 0
      ansible.builtin.debug:
        msg: "Slack not installed. Add 'slack' to Brewfile and run brew bundle."

- name: Install Slack (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Check if Slack is already installed
      ansible.builtin.command: dpkg-query -W slack-desktop
      register: _slack_installed
      changed_when: false
      failed_when: false

    - name: Install Slack from latest .deb
      when: _slack_installed.rc != 0
      block:
        - name: Query Slack API for latest release URL
          ansible.builtin.uri:
            url: "https://slack.com/api/desktop.latestRelease?variant=deb&arch=x64"
            return_content: true
          register: _slack_api

        - name: Create temp file for Slack download
          ansible.builtin.tempfile:
            suffix: .deb
          register: _slack_tmp

        - name: Download latest Slack .deb
          ansible.builtin.get_url:
            url: "{{ _slack_api.json.url }}"
            dest: "{{ _slack_tmp.path }}"
            mode: "0644"

        - name: Install Slack .deb
          ansible.builtin.apt:
            deb: "{{ _slack_tmp.path }}"
            state: present
          become: true

        - name: Clean up Slack temp file
          ansible.builtin.file:
            path: "{{ _slack_tmp.path }}"
            state: absent
