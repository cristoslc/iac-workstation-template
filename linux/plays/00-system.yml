---
- name: "Phase 0: System foundation"
  hosts: localhost
  connection: local

  pre_tasks:
    - name: Verify running on Debian-based Linux
      ansible.builtin.assert:
        that: ansible_facts.os_family == "Debian"
        fail_msg: "This playbook is for Debian-based Linux only."

    # Remove apt source entries that reference repos whose Signed-By
    # values conflict. ansible.builtin.find with `contains` missed these
    # (possibly in /etc/apt/sources.list or files without .list/.sources
    # extensions), so we use grep -rl to search ALL files under /etc/apt/.
    - name: Remove conflicting VS Code apt sources
      ansible.builtin.shell: |
        set -euo pipefail
        found=0
        # Remove any file in sources.list.d containing the VS Code repo URL,
        # EXCEPT the one we manage (vscode.list / vscode.sources).
        for f in $(grep -rl 'packages\.microsoft\.com/repos/code' /etc/apt/sources.list.d/ 2>/dev/null || true); do
          case "$(basename "$f")" in
            vscode.list|vscode.sources) continue ;;
          esac
          echo "Removing $f"
          rm -f "$f"
          found=1
        done
        # Also strip matching lines from /etc/apt/sources.list itself
        if grep -q 'packages\.microsoft\.com/repos/code' /etc/apt/sources.list 2>/dev/null; then
          echo "Cleaning /etc/apt/sources.list"
          sed -i '/packages\.microsoft\.com\/repos\/code/d' /etc/apt/sources.list
          found=1
        fi
        [ "$found" -eq 1 ] && echo "CHANGED" || echo "OK"
      args:
        executable: /bin/bash
      register: _vscode_cleanup
      changed_when: "'CHANGED' in _vscode_cleanup.stdout"
      become: true

    - name: Remove conflicting 1Password apt sources
      ansible.builtin.shell: |
        set -euo pipefail
        found=0
        for f in $(grep -rl 'downloads\.1password\.com' /etc/apt/sources.list.d/ 2>/dev/null || true); do
          case "$(basename "$f")" in
            1password.list|1password.sources) continue ;;
          esac
          echo "Removing $f"
          rm -f "$f"
          found=1
        done
        if grep -q 'downloads\.1password\.com' /etc/apt/sources.list 2>/dev/null; then
          echo "Cleaning /etc/apt/sources.list"
          sed -i '/downloads\.1password\.com/d' /etc/apt/sources.list
          found=1
        fi
        [ "$found" -eq 1 ] && echo "CHANGED" || echo "OK"
      args:
        executable: /bin/bash
      register: _1password_cleanup
      changed_when: "'CHANGED' in _1password_cleanup.stdout"
      become: true

  roles:
    - role: base
      tags: [base, system]
      when: apply_system_roles | default(true) | bool

    - role: system
      tags: [system]
      when: apply_system_roles | default(true) | bool
