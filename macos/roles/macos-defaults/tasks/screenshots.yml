---
- name: "Screenshots: Save to ~/Screenshots"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/Screenshots"
    state: directory
    mode: "0755"

- name: "Screenshots: Set save location"
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: location
    type: string
    value: "{{ ansible_facts.env.HOME }}/Screenshots"
    state: present

- name: "Screenshots: Save as PNG"
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: type
    type: string
    value: png
    state: present

- name: "Screenshots: Disable shadow"
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: disable-shadow
    type: bool
    value: true
    state: present
